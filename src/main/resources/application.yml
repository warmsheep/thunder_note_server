server:
  port: 8080

spring:
  application:
    name: thunder-note-server
  datasource:
    url: jdbc:postgresql://localhost:15432/thunder_note
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5s
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

security:
  jwt:
    secret: thunder-note-super-secure-jwt-secret-key-please-change-now-2026
    issuer: thunder-note-server
    access-expiration: 3600000
    refresh-expiration: 604800000

minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: thunder-note

logging:
  level:
    root: info
    com.flashnote: debug
  file:
    name: logs/thunder-note.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
